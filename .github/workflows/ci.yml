name: CI

on:
  push:
    branches: [master, the-refactor]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (server + web)
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build SPA
        run: bun run build:web
        env:
          VITE_LFM_KEY: ci-placeholder
          VITE_LFM_CALLBACK: http://localhost/callback
